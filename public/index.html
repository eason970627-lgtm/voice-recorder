<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 在地導遊 - 登入</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <div id="view-login" class="view active glass-panel">
            <h1>AI 在地導遊</h1>
            <p>請使用您的 Google 帳號登入系統</p>
            <div id="g_id_onload"
                 data-client_id="970732083734-28k4jtivkvrdcuf314sp3d1c3ltfn9oj.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="center"></div>
        </div>
    </div>
    <script>
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(decodeURIComponent(window.atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
        }
        function handleGoogleLogin(response) {
            const payload = decodeJwtResponse(response.credential);
            const googleId = payload.sub;
            localStorage.setItem('currentUser', googleId);
            localStorage.setItem('currentUserName', payload.name);
            
            const hasEnrolled = localStorage.getItem(`voice_enrolled_${googleId}`);
            if (!hasEnrolled) {
                window.location.href = '/register';
            } else {
                window.location.href = `/user/${googleId}/record`;
            }
        }
    </script>
</body>
</html>
